name: Manual-Lite-Only-Build

# 改为手动触发
on:
  workflow_dispatch:
    inputs:
      name:
        description: '构建名称'
        required: true
        default: 'manual-build'
      minify:
        description: '是否开启混淆压缩'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    name: Build Lite Android App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set current date
        run: echo "date_today=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Set repository name
        run: echo "repository_name=$(echo '${{ github.repository }}' | awk -F '/' '{print $2}')" >> $GITHUB_ENV

      - name: Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # 该项目包含 Rust 组件，必须保留此环境
      - name: Setup rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          override: true

      - name: Install cargo-ndk
        run: cargo install cargo-ndk || true

      - name: Add Android Rust targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add x86_64-linux-android

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Cache Rust
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ./rs-hf-tokenizer/target/
            ./apk-recompress/target/
          key: rust-cache-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install Android NDK
        run: |
          echo "y" | sdkmanager --install "ndk;29.0.14206865"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> $GITHUB_ENV

      # 核心编译步骤：只编译 LiteRelease，且跳过代码检查和测试
      - name: Build App
        run: |
          bash ./gradlew clean assembleLiteRelease -x ktlintCheck -x ktlintKotlinScriptCheck -x test
        env:
          CI_BUILD_MINIFY: ${{ inputs.minify }}

      - name: Move files
        run: |
          mkdir -p app/build/upload
          # 只移动 Lite 版本的 APK，不再引用 Full 版本
          mv app/build/outputs/apk/lite/release/app-lite-release.apk app/build/upload/zhihu-lite.apk

      # Lite 版特有的 APK 再压缩步骤（Rust 工具）
      - name: Recompress APK
        if: ${{ inputs.minify }}
        run: |
          cd apk-recompress
          cargo run --release -- -i ../app/build/upload/zhihu-lite.apk -o ./zhihu-lite-final.apk
          mv ./zhihu-lite-final.apk ../app/build/upload/zhihu-lite.apk

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.date_today }} - Lite - ${{ inputs.name }}
          path: app/build/upload/zhihu-lite.apk

      # 如果你手动启动并勾选了混淆，这里会创建一个包含 APK 的 Release
      - name: Create Release
        if: ${{ inputs.minify }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v-${{ env.date_today }}-${{ github.run_number }}"
          name: "知乎 Lite 自用版 (${{ env.date_today }})"
          body: |
            这是基于开源项目编译的知乎 Lite 纯净版。
            包名已修改为 com.zhihu.android，安装前请卸载原版。
          files: |
            app/build/upload/zhihu-lite.apk
          token: ${{ github.token }}
